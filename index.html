<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김지년 강사 포트폴리오</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        /* 1. 기본 테마 설정 */
        :root {
            --primary-color: #2c3e50;    /* 진한 남색 - 신뢰감 */
            --accent-color: #e67e22;     /* 오렌지색 - 포인트 */
            --bg-body: #f0f2f5;          /* 전체 배경색 */
            --bg-card: #ffffff;          /* 카드 배경색 */
            --text-main: #333333;
            --tag-bg: #e8f0fe;           /* 카테고리 태그 배경색 */
            --tag-text: #1a73e8;         /* 카테고리 태그 글자색 */
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1.8;
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            word-break: keep-all;
        }

        /* 2. 헤더 디자인 */
        header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 5rem 1rem;
            text-align: center;
            border-bottom: 6px solid var(--accent-color);
        }

        .profile-img {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            object-fit: cover;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        header h1 { font-size: 2.5rem; margin: 0.5rem 0; font-weight: 700; }

        /* 슬로건 강조 디자인 */
        .slogan-box {
            margin: 1.5rem 0;
            display: inline-block;
            padding: 10px 25px;
            background: rgba(230, 126, 34, 0.15);
            border-radius: 50px;
            border: 1px solid var(--accent-color);
            color: #ff9f43;
            font-weight: 500;
            font-size: 1.2rem;
        }
        .slogan-divider { margin: 0 15px; opacity: 0.5; }

        .expert-sub { font-size: 1.1rem; color: #bdc3c7; font-weight: 300; }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

            background: var(--bg-card);
            padding: 2.5rem;
