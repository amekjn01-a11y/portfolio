<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김지년 강사 포트폴리오</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #34495e;
            --accent-color: #e67e22;
            --bg-color: #fdfcf5;
            --card-bg-color: #ffffff;
            --text-color: #333;
            --tag-bg-color: #fbe9e7;
            --tag-text-color: #d84315;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1.7;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 4rem 1rem;
            text-align: center;
            border-bottom: 5px solid var(--accent-color);
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid white;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 1.5rem;
            background-color: #ddd;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        section {
            background: var(--card-bg-color);
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        h2 {
            border-left: 6px solid var(--accent-color);
            padding-left: 1rem;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        /* 주요 교육 분야 태그 스타일 */
        .education-fields {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 1rem;
        }

        .field-tag {
            background: var(--tag-bg-color);
            color: var(--tag-text-color);
            padding: 8px 18px;
            border-radius: 25px;
            font-weight: 500;
            font-size: 0.95rem;
            border: 1px solid #ffccbc;
            transition: all 0.3s;
        }

        .field-tag:hover {
            background: var(--accent-color);
            color: white;
            transform: translateY(-3px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            padding: 1.5rem;
            border-radius: 10px;
            background: #fffaf5;
            border: 1px solid #ffe0b2;
        }

        .card h3 { margin-top: 0; color: var(--primary-color); font-size: 1.1rem; }
        .card p { margin: 0.5rem 0; font-size: 0.95rem; }
        .card .date { color: var(--accent-color); font-weight: bold; font-size: 0.85rem; }

        .social-links {
            margin-top: 1.5rem;
        }

        .social-links a {
            color: white;
            font-size: 2.2rem;
            margin: 0 15px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .social-links a:hover {
            color: var(--accent-color);
            transform: translateY(-5px);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
        }

        .gallery-item {
            background: #eee;
            border-radius: 8px;
            overflow: hidden;
            height: 200px;
        }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .contact-section {
            text-align: center;
            padding: 3.5rem;
            background: var(--primary-color);
            color: white;
            border-radius: 15px;
            margin-top: 2rem;
        }

        .btn {
            background: var(--accent-color);
            color: white;
            padding: 15px 40px;
            border-radius: 35px;
            text-decoration: none;
            font-weight: bold;
            font-size:
