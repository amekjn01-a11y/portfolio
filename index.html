<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김지년 강사 포트폴리오</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --bg-color: #f4f7f6;
            --card-bg-color: #ffffff;
            --text-color: #333;
            --tag-bg: #ebf2f6;
            --tag-text: #2c3e50;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1.7;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            word-break: keep-all;
        }

        /* 헤더 영역 최적화 */
        header {
            background: var(--primary-color);
            color: white;
            padding: 5rem 1rem 4rem 1rem;
            text-align: center;
            border-bottom: 6px solid var(--accent-color);
        }

        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.2);
            object-fit: cover;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h1 { font-size: 2.2rem; margin: 0.5rem 0; font-weight: 700; }

        .slogan-container {
            margin: 1.5rem 0;
            font-size: 1.2rem;
            color: var(--accent-color);
            font-weight: 500;
        }
        .slogan-divider { margin: 0 12px; opacity: 0.3; color: white; }

        .expert-title { font-size: 1.1rem; color: #bdc3c7; font-weight: 300; }

        /* 컨테이너 및 섹션 */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        section {
            background: var(--card-bg-color);
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h2 {
            font-size: 1.6rem;
            border-left: 6px solid var(--accent-color);
            padding-left: 18px;
            color: var(--primary-color);
            margin-bottom: 2rem;
        }

        /* 교육 분야 태그 복구 및 강화 */
        .education-fields {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .field-tag {
            background: var(--tag-bg);
            color: var(--tag-text);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        .field-tag:hover {
            background: var(--accent-color);
            color: white;
            transform: translateY(-2px);
        }

        /* 그리드 및 카드 레이아웃 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            border-bottom: 1px solid #eee;
            padding-bottom: 1.2rem;
            margin-bottom: 1.2rem;
        }
        .card:last-child { border-bottom: none; }
        .card h3 { margin: 0 0 0.6rem 0; color: var(--primary-color); font-size: 1.15rem; }
        .card .date { color: var(--accent-color); font-size: 0.9rem; font-weight: 700; display: block; margin-bottom: 0.3rem; }
        .card p { margin: 0.4rem 0; color: #555; font-size: 1rem; }

        /* 갤러리 이미지 크기 통일 (중요) */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }
        .gallery-item {
            width: 100%;
            aspect-ratio: 4 / 3; /* 모든 이미지와 영상 비율 통일 */
            background: #f0f0f0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 이미지가 찌그러지지 않고 영역을 꽉 채움 */
            display: block;
        }

        /* 소셜 링크 */
        .social-links { margin-top: 2rem; }
        .social-links a {
            color: white;
            font-size: 1.8rem;
            margin: 0 15px;
            transition: 0.3s;
            opacity: 0.8
